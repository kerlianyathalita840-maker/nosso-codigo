<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Pasta do Xuxu ❤️</title>

<style>

body{
background:#8B008B;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.galeria img{
width:100%;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.galeria img:hover{
transform:scale(1.05);
box-shadow:0 0 15px pink;
}

#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
align-items:center;
justify-content:center;
}

#modal img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

button{
margin:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#8B008B;
color:white;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Pasta do Xuxu ❤️</h1>

<button onclick="voltar()">⬅ Voltar</button>

<audio id="musica" autoplay muted loop>
<source src="../audio.mp3" type="audio/mpeg">
</audio>

<div class="galeria">

<img src="foto1.png" onclick="abrir(this)">
<img src="foto2.png" onclick="abrir(this)">
<img src="foto3.png" onclick="abrir(this)">
<img src="foto4.png" onclick="abrir(this)">
<img src="foto5.png" onclick="abrir(this)">
<img src="foto6.png" onclick="abrir(this)">
<img src="foto7.png" onclick="abrir(this)">
<img src="foto8.png" onclick="abrir(this)">
<img src="foto9.png" onclick="abrir(this)">
<img src="foto10.png" onclick="abrir(this)">
<img src="foto11.png" onclick="abrir(this)">
<img src="foto12.png" onclick="abrir(this)">
<img src="foto13.png" onclick="abrir(this)">

</div>

<div id="modal" onclick="fechar()">
<img id="imagemGrande">
</div>

<script>

const musica=document.getElementById("musica");

window.addEventListener("load",()=>{

let tempo=localStorage.getItem("musicaTempo");

if(tempo){
musica.currentTime=tempo;
}

musica.play();

setTimeout(()=>{
musica.muted=false;
},1000);

});

function voltar(){

localStorage.setItem("musicaTempo",musica.currentTime);

window.location.href="../index.html";

}

function abrir(img){

document.getElementById("modal").style.display="flex";

document.getElementById("imagemGrande").src=img.src;

}

function fechar(){

document.getElementById("modal").style.display="none";

}

</script>

</body>
</html>
