<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Código ❤️</title>

<style>

body{
margin:0;
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
margin-top:20px;
}

img{
width:300px;
height:300px;
object-fit:cover;
border-radius:15px;
margin-top:20px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#contador{
margin-top:15px;
font-size:20px;
}

.heart{
position:fixed;
top:-10px;
color:red;
font-size:20px;
animation:cair 5s linear infinite;
}

@keyframes cair{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body onclick="tocarMusica()">

<h1>Nosso Código ❤️</h1>

<h2>22/03/2025</h2>

<a href="pasta-do-xuxu/">

<img id="foto" src="pasta-do-xuxu/foto1.png">

<br>

<button>Clique aqui 💌</button>

</a>

<div id="contador"></div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

function tocarMusica(){
document.getElementById("musica").play();
}

let fotos=[
"pasta-do-xuxu/foto1.png",
"pasta-do-xuxu/foto2.png",
"pasta-do-xuxu/foto3.png",
"pasta-do-xuxu/foto4.png"
];

let i=0;

setInterval(()=>{

i=(i+1)%fotos.length;

document.getElementById("foto").src=fotos[i];

},3000);

let inicio=new Date("2025-03-22");

setInterval(()=>{

let agora=new Date();

let diff=agora-inicio;

let dias=Math.floor(diff/(1000*60*60*24));

document.getElementById("contador").innerText=
"Juntos há "+dias+" dias ❤️";

},1000);

function criarCoracao(){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(10+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(criarCoracao,300);

</script>

</body>
</html>
