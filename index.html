<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Primeiro Ano ❤️</title>

<style>

body{
margin:0;
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
margin-top:20px;
}

img{
width:300px;
height:300px;
object-fit:cover;
border-radius:15px;
margin-top:20px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
display:block;
margin-left:auto;
margin-right:auto;
}

button:hover{
background:#16a34a;
}

#contador{
margin-top:15px;
font-size:20px;
}

.heart{
position:fixed;
top:-10px;
color:red;
font-size:20px;
animation:cair 5s linear infinite;
}

@keyframes cair{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>

<h1> Eu Te Amo ❤️</h1>
<h2>22/03/2025</h2>

<img id="foto" src="pasta-do-xuxu/foto1.png">

<!-- BOTÃO DA MÚSICA -->
<button onclick="tocarmusica()">🎵 Tocar Música</button>

<!-- BOTÃO DA PASTA -->
<button onclick="abrirPasta()">📂 Ver nossas fotos</button>

<div id="contador"></div>

<audio id="musica">
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script>

function tocarMusica(){
let musica = document.getElementById("musica");

musica.currentTime = 0;
musica.play().then(()=>{
console.log("tocando");
}).catch(()=>{
alert("Clique novamente no botão para liberar o som 🎵");
});
}

function abrirPasta(){
window.location.href = "pasta-do-xuxu/";
}

let fotos=[
"pasta-do-xuxu/foto1.png",
"pasta-do-xuxu/foto2.png",
"pasta-do-xuxu/foto3.png",
"pasta-do-xuxu/foto4.png",
"pasta-do-xuxu/foto5.png",
"pasta-do-xuxu/foto6.png",
"pasta-do-xuxu/foto7.png",
"pasta-do-xuxu/foto8.png",
"pasta-do-xuxu/foto9.png",
"pasta-do-xuxu/foto10.png",
"pasta-do-xuxu/foto11.png",
"pasta-do-xuxu/foto12.png",
"pasta-do-xuxu/foto13.png"
];

let i=0;

setInterval(()=>{
i=(i+1)%fotos.length;
document.getElementById("foto").src=fotos[i];
},3000);

let inicio=new Date("2025-03-22");

setInterval(()=>{
let agora=new Date();
let diff=agora-inicio;
let dias=Math.floor(diff/(1000*60*60*24));

document.getElementById("contador").innerText =
"Juntos há " + dias + " dias ❤️";
},1000);

function criarCoracao(){
let heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(10+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(criarCoracao,300);

</script>

</body>
</html>
