<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Código 💖</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

img {
  width: 300px;
  height: 300px;
  object-fit: cover;
  border-radius: 15px;
  margin-top: 20px;
  transition: 0.5s;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<h1>Nosso Código 💖</h1>

<h2 id="frase">Carregando...</h2>

<img id="foto" src="https://imgur.com/a/JWxhUq1">

<br>

<button onclick="mudarMensagem()">Clique aqui 💌</button>

<audio id="musica" autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
let fotos = ["https://imgur.com/a/JWxhUq1"];
let i = 0;

setInterval(() => {
  i = (i + 1) % fotos.length;
  document.getElementById("foto").src = fotos[i];
}, 2000);

function mudarMensagem() {
  document.getElementById("frase").innerText =
  "Você é meu código favorito ❤️";
}
</script>

</body>
</html>
